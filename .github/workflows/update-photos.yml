name: Update Photos

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch photos from iCloud
        run: node fetch-photos.js
        env:
          ALBUM_TOKEN: ${{ secrets.ALBUM_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/photos.json
          git diff --staged --quiet || git commit -m "Update photos.json $(date -u +%Y-%m-%d)"
          git push
