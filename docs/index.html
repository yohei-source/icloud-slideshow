<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Slideshow">
<link rel="manifest" href="manifest.json">
<title>Photo Slideshow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
  }
  .slide.active { opacity: 1; }
  .slide img, .slide video {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }
  #clock {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 20px);
    left: 20px;
    color: rgba(255,255,255,0.6);
    font-size: 2.5vw;
    font-weight: 300;
    letter-spacing: 0.05em;
    z-index: 10;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  #status {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.5);
    font-size: 1.2em;
    z-index: 20;
  }
  #counter {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 20px);
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 1.5vw;
    z-index: 10;
    pointer-events: none;
  }
  #pause-ring {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 20px);
    right: 20px;
    width: 60px; height: 60px;
    z-index: 30;
    pointer-events: none;
    display: none;
  }
  #pause-ring circle {
    fill: none;
    stroke: rgba(255,255,255,0.5);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 226;
    stroke-dashoffset: 0;
    transform: rotate(-90deg);
    transform-origin: center;
  }
  #pause-ring.active { display: block; }
  #pause-ring.active circle {
    animation: countdown 60s linear forwards;
  }
  @keyframes countdown {
    from { stroke-dashoffset: 0; }
    to { stroke-dashoffset: 226; }
  }
  #pause-icon {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 20px) + 18px);
    right: 38px;
    z-index: 31;
    pointer-events: none;
    display: none;
    color: rgba(255,255,255,0.5);
    font-size: 24px;
  }
  #pause-icon.active { display: block; }
</style>
</head>
<body>
<div id="slide-a" class="slide"></div>
<div id="slide-b" class="slide"></div>
<div id="clock"></div>
<div id="counter"></div>
<div id="status">Loading...</div>
<svg id="pause-ring" viewBox="0 0 80 80"><circle cx="40" cy="40" r="36"/></svg>
<div id="pause-icon">&#10074;&#10074;</div>

<script>
(function() {
  'use strict';

  const params = new URLSearchParams(location.search);
  const INTERVAL = (parseInt(params.get('interval')) || 15) * 1000;
  const SHUFFLE = params.get('shuffle') !== '0';
  const SHOW_CLOCK = params.get('clock') !== '0';

  const slideA = document.getElementById('slide-a');
  const slideB = document.getElementById('slide-b');
  const clockEl = document.getElementById('clock');
  const counterEl = document.getElementById('counter');
  const statusEl = document.getElementById('status');
  const pauseRing = document.getElementById('pause-ring');
  const pauseIcon = document.getElementById('pause-icon');

  let photos = [];
  let currentIndex = -1;
  let activeSlide = 'a';
  let timer = null;
  let paused = false;
  let pauseTimer = null;

  // Clock
  if (SHOW_CLOCK) {
    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('ja-JP', {
        hour: '2-digit', minute: '2-digit'
      });
    }
    updateClock();
    setInterval(updateClock, 10000);
  } else {
    clockEl.style.display = 'none';
  }

  // Wake Lock
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        const lock = await navigator.wakeLock.request('screen');
        lock.addEventListener('release', () => {
          setTimeout(requestWakeLock, 1000);
        });
      }
    } catch (e) { /* ignore */ }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // Shuffle array (Fisher-Yates)
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Preload image with timeout
  function preloadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const timeout = setTimeout(() => { img.src = ''; reject(new Error('Image timeout')); }, 8000);
      img.onload = () => { clearTimeout(timeout); resolve(img); };
      img.onerror = () => { clearTimeout(timeout); reject(new Error('Image error')); };
      img.src = url;
    });
  }

  // Prepare video with timeout
  function prepareVideo(url) {
    return new Promise((resolve, reject) => {
      const video = document.createElement('video');
      video.muted = true;
      video.playsInline = true;
      video.autoplay = true;
      const timeout = setTimeout(() => { video.src = ''; reject(new Error('Video timeout')); }, 8000);
      video.oncanplay = () => { clearTimeout(timeout); resolve(video); };
      video.onerror = () => { clearTimeout(timeout); reject(new Error('Video error')); };
      video.src = url;
      video.load();
    });
  }

  // Schedule next (always async via setTimeout to prevent stack overflow)
  function scheduleNext(delay) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(showNext, delay);
  }

  // Show next item
  async function showNext() {
    if (photos.length === 0) return;

    currentIndex = (currentIndex + 1) % photos.length;
    if (currentIndex === 0 && SHUFFLE) {
      photos = shuffle(photos);
    }

    const photo = photos[currentIndex];
    counterEl.textContent = `${currentIndex + 1} / ${photos.length}`;

    try {
      const incoming = activeSlide === 'a' ? slideB : slideA;
      const outgoing = activeSlide === 'a' ? slideA : slideB;

      // Clean up outgoing slide
      const oldVideo = outgoing.querySelector('video');
      if (oldVideo) { oldVideo.pause(); oldVideo.src = ''; oldVideo.load(); }
      outgoing.innerHTML = '';

      if (photo.type === 'video') {
        const video = await prepareVideo(photo.url);
        incoming.innerHTML = '';
        incoming.appendChild(video);
        incoming.classList.add('active');
        outgoing.classList.remove('active');
        activeSlide = activeSlide === 'a' ? 'b' : 'a';
        video.play();
        const maxTimer = setTimeout(() => { video.pause(); video.src = ''; scheduleNext(0); }, 120000);
        video.onended = () => { clearTimeout(maxTimer); scheduleNext(0); };
        video.onerror = () => { clearTimeout(maxTimer); scheduleNext(0); };
        return;
      } else {
        const img = await preloadImage(photo.url);
        incoming.innerHTML = '';
        incoming.appendChild(img);
        incoming.classList.add('active');
        outgoing.classList.remove('active');
        activeSlide = activeSlide === 'a' ? 'b' : 'a';
      }
    } catch (e) {
      scheduleNext(100);
      return;
    }

    scheduleNext(INTERVAL);
  }

  // Load photos.json
  async function loadPhotos() {
    try {
      const res = await fetch('photos.json?t=' + Date.now());
      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) {
        statusEl.textContent = 'No photos found';
        return;
      }
      photos = SHUFFLE ? shuffle(data) : data;
      statusEl.style.display = 'none';
      currentIndex = -1;
      if (timer) clearTimeout(timer);
      showNext();
    } catch (e) {
      statusEl.textContent = 'Error loading photos';
      console.error(e);
    }
  }

  // Auto-reload photos.json every hour
  setInterval(loadPhotos, 3600000);

  // --- Touch controls ---
  const PAUSE_DURATION = 60000;

  function getActiveVideo() {
    const active = activeSlide === 'a' ? slideA : slideB;
    return active.querySelector('video');
  }

  function startPause() {
    if (timer) clearTimeout(timer);
    paused = true;
    const video = getActiveVideo();
    if (video) video.pause();
    pauseRing.classList.remove('active');
    pauseIcon.classList.remove('active');
    void pauseRing.offsetWidth;
    pauseRing.classList.add('active');
    pauseIcon.classList.add('active');
    if (pauseTimer) clearTimeout(pauseTimer);
    pauseTimer = setTimeout(resumePlay, PAUSE_DURATION);
  }

  function resumePlay() {
    paused = false;
    pauseRing.classList.remove('active');
    pauseIcon.classList.remove('active');
    if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
    const video = getActiveVideo();
    if (video) { video.play(); return; }
    scheduleNext(INTERVAL);
  }

  let touchStartX = 0;
  let touchStartY = 0;
  let touchMoved = false;

  document.body.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
  }, { passive: true });

  document.body.addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) touchMoved = true;
  }, { passive: true });

  document.body.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;

    if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(e.changedTouches[0].clientY - touchStartY) * 2) {
      // Swipe
      if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
      paused = false;
      pauseRing.classList.remove('active');
      pauseIcon.classList.remove('active');
      if (timer) clearTimeout(timer);
      if (dx > 0) {
        showNext();
      } else {
        currentIndex = Math.max(currentIndex - 2, -1);
        showNext();
      }
    } else if (!touchMoved) {
      // Tap
      if (paused) {
        resumePlay();
      } else {
        startPause();
      }
    }
  }, { passive: true });

  loadPhotos();
})();
</script>
</body>
</html>
